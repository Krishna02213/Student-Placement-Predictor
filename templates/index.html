<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
          --ink: #101b33;
          --ink-card: #17233f;
          --ink-card-2: #1c2a4a;
          --paper: #f4efe3;
          --paper-dim: #e8e1d1;
          --gold: #c9a227;
          --gold-bright: #e0bb3f;
          --green: #4c9a6a;
          --rust: #c2542d;
          --text-soft: #aab3c9;
          --text-faint: #6b7794;

          --font-display: "Fraunces", Georgia, serif;
          --font-body: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
          --font-mono: "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          min-height: 100vh;
          font-family: var(--font-body);
          color: var(--paper);
          background-color: var(--ink);
          background-image:
            linear-gradient(var(--ink-card-2) 1px, transparent 1px),
            linear-gradient(90deg, var(--ink-card-2) 1px, transparent 1px);
          background-size: 32px 32px;
          background-position: center;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 20px;
        }

        .sheet {
          width: 100%;
          max-width: 480px;
        }

        .card {
          background: var(--ink-card);
          border: 1px solid rgba(201, 162, 39, 0.25);
          border-radius: 6px;
          padding: 40px 36px 36px;
          box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.03) inset,
            0 24px 60px -20px rgba(0, 0, 0, 0.6);
          position: relative;
        }

        .card::before {
          content: "";
          position: absolute;
          inset: 8px;
          border: 1px solid rgba(201, 162, 39, 0.15);
          border-radius: 3px;
          pointer-events: none;
        }

        .card__header {
          margin-bottom: 28px;
        }

        .eyebrow {
          display: block;
          font-family: var(--font-mono);
          font-size: 11px;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--gold);
          margin-bottom: 14px;
        }

        h1 {
          font-family: var(--font-display);
          font-weight: 600;
          font-size: 28px;
          line-height: 1.2;
          margin: 0 0 10px;
          color: var(--paper);
          letter-spacing: -0.01em;
        }

        .subhead {
          margin: 0;
          font-size: 13.5px;
          line-height: 1.5;
          color: var(--text-soft);
        }

        .ledger {
          border-top: 1px solid rgba(201, 162, 39, 0.22);
          margin-top: 8px;
        }

        .ledger__row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          padding: 14px 0;
          border-bottom: 1px solid rgba(201, 162, 39, 0.14);
        }

        .ledger__row label {
          font-size: 13px;
          font-weight: 500;
          color: var(--paper);
          display: flex;
          flex-direction: column;
          gap: 3px;
          flex: 1;
        }

        .hint {
          font-family: var(--font-mono);
          font-size: 10.5px;
          font-weight: 400;
          letter-spacing: 0.03em;
          color: var(--text-faint);
          text-transform: lowercase;
        }

        .field {
          flex-shrink: 0;
        }

        .field input {
          width: 108px;
          font-family: var(--font-mono);
          font-size: 15px;
          font-weight: 500;
          text-align: right;
          color: var(--ink);
          background: var(--paper);
          border: 1px solid var(--paper-dim);
          border-radius: 4px;
          padding: 9px 12px;
          outline: none;
          transition: box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .field input::placeholder {
          color: #9a9280;
        }

        .field input:hover {
          border-color: var(--gold);
        }

        .field input:focus {
          border-color: var(--gold);
          background: #fffdf7;
          box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.25);
        }

        .btn {
          width: 100%;
          margin-top: 26px;
          padding: 13px 18px;
          font-family: var(--font-body);
          font-size: 13px;
          font-weight: 600;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          color: var(--ink);
          background: linear-gradient(180deg, var(--gold-bright), var(--gold));
          border: none;
          border-radius: 4px;
          cursor: pointer;
          transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        }

        .btn:hover {
          filter: brightness(1.05);
          box-shadow: 0 6px 18px -6px rgba(201, 162, 39, 0.5);
        }

        .btn:active {
          transform: translateY(1px);
        }

        .btn:focus-visible {
          outline: 2px solid var(--paper);
          outline-offset: 2px;
        }

        /* Verdict stamp */
        .result {
          margin-top: 30px;
          padding: 18px 20px;
          border: 1.5px dashed var(--gold);
          border-radius: 4px;
          background: rgba(201, 162, 39, 0.06);
          transform: rotate(-1.2deg);
          display: flex;
          flex-direction: column;
          gap: 4px;
          animation: stamp-in 0.25s ease-out;
        }

        @keyframes stamp-in {
          from {
            opacity: 0;
            transform: rotate(-1.2deg) scale(0.94);
          }
          to {
            opacity: 1;
            transform: rotate(-1.2deg) scale(1);
          }
        }

        .result__label {
          font-family: var(--font-mono);
          font-size: 10.5px;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: var(--gold);
        }

        .result__text {
          font-family: var(--font-display);
          font-size: 19px;
          font-weight: 600;
          color: var(--paper);
        }

        .result--positive {
          border-color: var(--green);
          background: rgba(76, 154, 106, 0.1);
        }
        .result--positive .result__label,
        .result--positive .result__text {
          color: var(--green);
        }

        .result--negative {
          border-color: var(--rust);
          background: rgba(194, 84, 45, 0.1);
        }
        .result--negative .result__label,
        .result--negative .result__text {
          color: var(--rust);
        }

        .footnote {
          text-align: center;
          margin-top: 18px;
          font-size: 11.5px;
          color: var(--text-faint);
        }

        @media (prefers-reduced-motion: reduce) {
          .result {
            animation: none;
          }
        }

        @media (max-width: 420px) {
          .card {
            padding: 30px 22px 28px;
          }
          .ledger__row {
            flex-wrap: wrap;
          }
          .field {
            width: 100%;
          }
          .field input {
            width: 100%;
            text-align: left;
          }
        }

    </style>
</head>
<body>

    <div class="sheet">
        <div class="card">

            <header class="card__header">
                <span class="eyebrow">Placement Cell &nbsp;/&nbsp; Form No. 05</span>
                <h1>Student Placement Predictor</h1>
                <p class="subhead">Enter your standing below to get a projected placement outcome.</p>
            </header>

            <form action="/predict" method="POST" class="ledger">

                <div class="ledger__row">
                    <label for="cgpa">
                        Cumulative GPA
                        <span class="hint">max 10.0</span>
                    </label>
                    <div class="field">
                        <input type="number" step="0.01" min="0" max="10" id="cgpa" name="cgpa" placeholder="8.45" required>
                    </div>
                </div>

                <div class="ledger__row">
                    <label for="communication_skills">
                        Communication Skills
                        <span class="hint">0–10</span>
                    </label>
                    <div class="field">
                        <input type="number" step="0.1" min="0" max="10" id="communication_skills" name="communication_skills" placeholder="7.5" required>
                    </div>
                </div>

                <div class="ledger__row">
                    <label for="resume_score">
                        Resume Rating
                        <span class="hint">0–10</span>
                    </label>
                    <div class="field">
                        <input type="number" step="0.1" min="0" max="10" id="resume_score" name="resume_score" placeholder="8.0" required>
                    </div>
                </div>

                <div class="ledger__row">
                    <label for="coding_score">
                        Coding Score
                        <span class="hint">0–10</span>
                    </label>
                    <div class="field">
                        <input type="number" step="0.1" min="0" max="10" id="coding_score" name="coding_score" placeholder="9.2" required>
                    </div>
                </div>

                <div class="ledger__row">
                    <label for="attendance_placement">
                        Placement Attendance
                        <span class="hint">%</span>
                    </label>
                    <div class="field">
                        <input type="number" step="0.1" min="0" max="100" id="attendance_placement" name="attendance_placement" placeholder="85.0" required>
                    </div>
                </div>

                <button type="submit" class="btn">Predict Status</button>
            </form>

            
                <div class="result" id="result">
                    <span class="result__label">Verdict</span>
                    <span class="result__text">Congratulations! You are likely to be Placed.</span>
                </div>
            

        </div>
        <p class="footnote">Estimates only &mdash; not an official placement guarantee.</p>
    </div>

    
    <script>
        // Cosmetic only: tint the verdict stamp based on wording. No backend logic touched.
        (function () {
            var el = document.getElementById('result');
            if (!el) return;
            var text = el.textContent.toLowerCase();
            if (text.indexOf('not') !== -1) {
                el.classList.add('result--negative');
            } else {
                el.classList.add('result--positive');
            }
        })();
    </script>
    

</body>
</html>
